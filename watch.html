<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>⌚️ Nivelato</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: 'Inter', system-ui, sans-serif; }
  .page { display: flex; flex-direction: column; height: 100dvh; }
  .page.hide { display: none; }

  .login { padding: 20px 16px; justify-content: center; gap: 10px; }
  .login h1 { font-size: 22px; font-weight: 900; color: #e64980; }
  .login p { font-size: 11px; color: #666; }
  .login input { padding: 14px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 14px; font-family: inherit; width: 100%; }
  .login input:focus { outline: none; border-color: #e64980; }
  .login button { padding: 14px; border-radius: 10px; border: none; background: #e64980; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .login .err { font-size: 10px; color: #ff6b6b; text-align: center; min-height: 14px; }

  header { padding: 10px 14px; background: #1a1a1a; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  header h1 { font-size: 14px; font-weight: 700; color: #e64980; }
  header button { padding: 6px 10px; border-radius: 6px; border: none; background: #333; color: #fff; font-size: 10px; font-weight: 600; cursor: pointer; font-family: inherit; }

  .stats { display: flex; gap: 4px; padding: 6px 10px; flex-shrink: 0; }
  .stats .s { flex: 1; background: #1a1a1a; border-radius: 6px; padding: 6px; text-align: center; }
  .stats .s .n { font-size: 18px; font-weight: 900; color: #e64980; }
  .stats .s .l { font-size: 7px; color: #555; text-transform: uppercase; }

  .list { flex: 1; overflow-y: auto; padding: 6px 10px; -webkit-overflow-scrolling: touch; }
  .job { background: #1a1a1a; border-radius: 8px; padding: 10px; margin-bottom: 4px; cursor: pointer; }
  .job:active { background: #222; }
  .job .n { font-size: 12px; font-weight: 700; }
  .job .m { font-size: 9px; color: #555; margin-top: 3px; display: flex; gap: 6px; }

  .detail { padding: 10px 14px; overflow-y: auto; }
  .detail .back { font-size: 20px; margin-bottom: 6px; cursor: pointer; }
  .detail h2 { font-size: 14px; font-weight: 700; color: #e64980; }
  .detail .sub { font-size: 9px; color: #555; margin-bottom: 10px; }
  .detail .r { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1a1a1a; font-size: 12px; }
  .detail .r .l { color: #555; }
  .detail .r .v { font-weight: 600; text-align: right; }
  .detail .sec { font-size: 8px; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.1em; margin: 10px 0 2px; }
</style>
</head>
<body>
<div id="pg-login" class="page login">
  <h1>⌚️ Nivelato</h1>
  <input type="email" id="wl-email" placeholder="Correo" />
  <input type="password" id="wl-pass" placeholder="Contraseña" />
  <button onclick="watchLogin()">Iniciar sesión</button>
  <div class="err" id="wl-err"></div>
</div>

<div id="pg-dash" class="page hide">
  <header><h1>⌚️ Nivelato</h1><button onclick="watchLogout()">Salir</button></header>
  <div class="stats"><div class="s"><div class="n" id="ws-t">0</div><div class="l">Total</div></div><div class="s"><div class="n" id="ws-d">0</div><div class="l">Hoy</div></div></div>
  <div class="list" id="w-list"><div style="text-align:center;padding:16px;color:#444;font-size:11px;">Cargando…</div></div>
</div>

<div id="pg-detail" class="page hide">
  <div class="detail">
    <div class="back" onclick="showDash()">‹ Volver</div>
    <div id="wd-body"></div>
  </div>
</div>

<script type="module">
import { auth, db } from './firebase-config.js';
import { signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js';
import { getDoc, doc, getDocs, collection, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js';

let allJobs = [];
function show(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hide'));
  document.getElementById(id).classList.remove('hide');
}

onAuthStateChanged(auth, user => { if (user) loadDash(user); else show('pg-login'); });

window.watchLogin = async () => {
  const email = document.getElementById('wl-email').value.trim();
  const pass = document.getElementById('wl-pass').value;
  const err = document.getElementById('wl-err');
  if (!email || !pass) { err.textContent = 'Completa los campos.'; return; }
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) { err.textContent = e.message; }
};

window.watchLogout = () => signOut(auth);

async function loadDash(user) {
  show('pg-dash');
  try {
    const ud = (await getDoc(doc(db, 'users', user.uid))).data();
    const orgId = ud.orgId;
    const snap = await getDocs(query(collection(db, 'orgs', orgId, 'jobs'), orderBy('createdAt', 'desc')));
    allJobs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  } catch(e) {
    document.getElementById('w-list').innerHTML = `<div style="text-align:center;padding:16px;color:#ff6b6b;font-size:11px;">${e.message}</div>`;
  }
}

function render() {
  const today = new Date().toISOString().slice(0,10);
  let td = 0;
  allJobs.forEach(j => {
    if (j.createdAt) { const d = j.createdAt.toDate ? j.createdAt.toDate() : new Date(j.createdAt); if (d.toISOString().slice(0,10) === today) td++; }
  });
  document.getElementById('ws-t').textContent = allJobs.length;
  document.getElementById('ws-d').textContent = td;
  document.getElementById('w-list').innerHTML = allJobs.length === 0
    ? '<div style="text-align:center;padding:16px;color:#444;font-size:11px;">Sin medidas.</div>'
    : allJobs.map((j, i) => {
      const d = j.createdAt ? (j.createdAt.toDate ? j.createdAt.toDate() : new Date(j.createdAt)) : new Date();
      return `<div class="job" onclick="openDetail(${i})">
        <div class="n">${j.customer || '—'}</div>
        <div class="m"><span>${j.project || ''}</span><span>${d.toLocaleDateString('es-PR',{day:'2-digit',month:'short'})}</span></div>
      </div>`;
    }).join('');
}

window.openDetail = (i) => {
  const j = allJobs[i];
  const d = j.createdAt ? (j.createdAt.toDate ? j.createdAt.toDate() : new Date(j.createdAt)) : new Date();
  let h = `<h2>${j.customer || 'Medida'}</h2><div class="sub">${j.installerName || ''} · ${d.toLocaleDateString('es-PR',{day:'2-digit',month:'short',year:'numeric'})}</div>`;
  if (j.hueco) {
    h += '<div class="sec">Medidas</div><div class="r"><span class="l">Ancho</span><span class="v">' + (j.hueco.anchoBot||'?') + '"</span></div><div class="r"><span class="l">Alto</span><span class="v">' + (j.hueco.altoIzq||'?') + '"</span></div>';
  }
  if (j.desniveles) {
    h += '<div class="sec">Desniveles</div>';
    ['paredIzq','paredDer','techo','piso'].forEach(k => {
      if (j.desniveles[k] && j.desniveles[k] !== '—') h += `<div class="r"><span class="l">${k}</span><span class="v">${j.desniveles[k]}</span></div>`;
    });
  }
  if (j.notas) h += '<div class="sec">Notas</div><div class="r"><span class="v">' + j.notas + '</span></div>';
  document.getElementById('wd-body').innerHTML = h;
  show('pg-detail');
};

window.showDash = () => show('pg-dash');
</script>
</body>
</html>
