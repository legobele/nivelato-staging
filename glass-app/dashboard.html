<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nivelato — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f0f2f5; min-height: 100dvh; }

    /* HEADER */
    header {
      background: #fff;
      border-bottom: 1px solid #e9ecef;
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .header-logo { font-size: 20px; font-weight: 700; color: #1971c2; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .org-badge { font-size: 12px; background: #e7f5ff; color: #1971c2; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
    .btn-logout { font-size: 13px; color: #868e96; background: none; border: none; cursor: pointer; font-family: inherit; }
    .btn-logout:hover { color: #c92a2a; }

    /* MAIN */
    main { padding: 24px 20px; max-width: 720px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 700; color: #212529; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #868e96; margin-bottom: 24px; }

    /* STATS ROW */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .stat-num { font-size: 28px; font-weight: 700; color: #1971c2; }
    .stat-label { font-size: 12px; color: #868e96; margin-top: 2px; }

    /* FILTERS */
    .filter-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-row input, .filter-row select {
      padding: 8px 12px;
      border: 1.5px solid #dee2e6;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: #fff;
    }
    .filter-row input:focus, .filter-row select:focus { border-color: #1971c2; }
    .filter-row input[type="date"] { flex: 1; min-width: 130px; }

    /* JOB LIST */
    .job-list { display: flex; flex-direction: column; gap: 10px; }
    .job-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: box-shadow 0.15s;
    }
    .job-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .job-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .job-title { font-size: 15px; font-weight: 600; color: #212529; }
    .job-date { font-size: 12px; color: #868e96; }
    .job-meta { font-size: 13px; color: #495057; }
    .job-meta span { margin-right: 12px; }
    .job-tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; margin-left: 6px; }
    .tag-ok { background: #ebfbee; color: #2f9e44; }
    .tag-warn { background: #fff3bf; color: #e67700; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      align-items: center; justify-content: center;
      padding: 20px;
      z-index: 100;
      display: none;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%; max-width: 820px;
      max-height: 90dvh;
      overflow-y: auto;
    }
    .modal-inner {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    .modal-details { flex: 1; min-width: 0; }
    .modal-canvas-wrap {
      flex: 0 0 320px;
      position: relative;
    }
    #modal-canvas {
      border-radius: 10px;
      background: #f0f4ff;
      display: block;
      width: 100%;
      touch-action: none;
      cursor: grab;
    }
    #modal-canvas:active { cursor: grabbing; }
    @media (max-width: 640px) {
      .modal-inner { flex-direction: column; }
      .modal-canvas-wrap { flex: unset; width: 100%; }
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #212529; }
    .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f3f5; font-size: 14px; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #868e96; }
    .detail-val { font-weight: 600; color: #212529; }
    .modal-notes { background: #f8f9fa; border-radius: 8px; padding: 12px; font-size: 13px; color: #495057; margin-top: 12px; }
    .detail-section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #adb5bd; margin: 16px 0 4px; }
    .detail-section-title:first-child { margin-top: 0; }
    .btn-close { width: 100%; padding: 12px; margin-top: 8px; background: #f1f3f5; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; }
    .btn-delete { width: 100%; padding: 12px; margin-top: 16px; background: #fff5f5; border: 1.5px solid #ffc9c9; border-radius: 8px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; color: #c92a2a; }
    .btn-delete:hover { background: #ffe3e3; }

    .empty-state { text-align: center; padding: 48px 20px; color: #868e96; font-size: 14px; }
    .loading { text-align: center; padding: 40px; color: #868e96; }

    /* MOBILE */
    @media (max-width: 600px) {
      main { padding: 16px 12px; }
      h1 { font-size: 18px; }
      .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-card { padding: 12px 8px; }
      .stat-num { font-size: 22px; }
      .stat-label { font-size: 11px; }
      .filter-row { flex-direction: column; gap: 8px; }
      .filter-row input, .filter-row select { width: 100%; }
      .job-card-top { flex-direction: column; gap: 4px; }
      .job-date { font-size: 11px; }
      .modal { padding: 20px 16px; border-radius: 12px; }
      .modal-title { font-size: 16px; }
      #join-code-section { flex-direction: column; align-items: flex-start; gap: 8px; }
      #join-code-section button { width: 100%; }
      .header-logo { font-size: 17px; }
      .org-badge { font-size: 11px; padding: 3px 8px; }
    }
    @media (max-width: 380px) {
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-logo">Nivelato</div>
  <div class="header-right">
    <div class="org-badge" id="org-name-badge">…</div>
    <button id="btn-new-measure" onclick="window.location.href='index.html'" style="display:none;background:#1971c2;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">+ Nueva medida</button>
    <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
  </div>
</header>

<main>
  <h1>Historial de medidas</h1>
  <div class="subtitle" id="dash-subtitle">Cargando…</div>
  <div id="join-code-section" style="display:none; background:#e8f0fe; border-radius:12px; padding:14px 20px; margin:16px 0 8px; align-items:center; gap:16px; flex-wrap:wrap;">
    <span style="font-size:11px; font-weight:600; color:#888; letter-spacing:0.05em;">CÓDIGO DEL TALLER:</span>
    <span id="join-code-display" style="font-size:24px; font-weight:700; color:#1a73e8; letter-spacing:0.15em; font-family:monospace; margin-left:8px;">——</span>
    <button onclick="copyJoinCode()" id="copy-btn" style="margin-left:auto; background:#1a73e8; color:#fff; border:none; border-radius:8px; padding:8px 18px; font-size:13px; font-weight:600; cursor:pointer;">📋 Copiar</button>
    <span style="font-size:11px; color:#888; width:100%; margin-top:2px;">Dáselo a tus empleados para que se registren en Nivelato</span>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Medidas totales</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-today">—</div><div class="stat-label">Hoy</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-warn">—</div><div class="stat-label">Con advertencias</div></div>
  </div>

  <div class="filter-row">
    <input type="date" id="filter-date" onchange="applyFilters()" />
    <select id="filter-installer" onchange="applyFilters()">
      <option value="">Todos los técnicos</option>
    </select>
  </div>

  <div class="job-list" id="job-list">
    <div class="loading">Cargando medidas…</div>
  </div>
</main>

<!-- JOB DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-title" id="modal-title">Detalle</div>
    <div class="modal-inner">
      <div class="modal-details">
        <div id="modal-body"></div>
        <button class="btn-delete" id="modal-delete-btn" onclick="deleteCurrentJob()">🗑 Eliminar medida</button>
        <button class="btn-close" onclick="closeModal()">Cerrar</button>
      </div>
      <div class="modal-canvas-wrap">
        <canvas id="modal-canvas" width="340" height="420"></canvas>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
  import { doc, getDoc, collection, query, orderBy, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  let allJobs = [];
  let currentUser = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    // check if account is pending approval
    const userSnap = await getDoc(doc(db, 'users', user.uid));
    if (userSnap.exists() && userSnap.data().disabled === true) {
      window._pendingSignOut = async () => { await signOut(auth); window.location.href = 'login.html'; };
      document.body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;font-family:Inter,sans-serif;gap:16px;padding:32px;text-align:center"><div style="font-size:48px">⏳</div><h2 style="color:#212529">Cuenta pendiente de aprobación</h2><p style="color:#868e96;max-width:320px">Tu cuenta está siendo revisada. El administrador del taller te dará acceso en breve.</p><button onclick="window._pendingSignOut()" style="padding:12px 28px;background:#1971c2;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">Cerrar sesión</button></div>';
      return;
    }
    currentUser = user;
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    const userData = userDoc.data();
    const DASH_ROLES = ['owner', 'cotizador', 'supervisor'];
    if (!userData || !DASH_ROLES.includes(userData.role)) {
      window.location.href = 'index.html'; return;
    }
    // supervisor and measurer can also create new measurements
    const canMeasure = ['owner', 'supervisor', 'measurer'].includes(userData.role);
    window._canMeasure = canMeasure;
    const orgId = userData.orgId;
    // load org name
    const btnNew = document.getElementById('btn-new-measure');
    if (btnNew && window._canMeasure) btnNew.style.display = 'block';
    const orgDoc = await getDoc(doc(db, 'orgs', orgId));
    const orgName = orgDoc.data()?.name || orgId;
    document.getElementById('org-name-badge').textContent = orgName;
    document.getElementById('dash-subtitle').textContent = `${orgName} · ${userData.role === 'owner' ? 'Administrador' : 'Cotizaciones'}`;
    // show join code for owners
    if (userData.role === 'owner') {
      const jcs = document.getElementById('join-code-section');
      jcs.style.display = 'flex';
      document.getElementById('join-code-display').textContent = orgId;
    }

    // load jobs
    window._db = db; window._orgId = orgId;
    const jobsRef = collection(db, 'orgs', orgId, 'jobs');
    const q = query(jobsRef, orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    allJobs = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // populate installer filter
    const installers = [...new Set(allJobs.map(j => j.installerName).filter(Boolean))];
    const sel = document.getElementById('filter-installer');
    installers.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      sel.appendChild(opt);
    });

    renderJobs(allJobs);

  window.applyFilters = () => {
    const date = document.getElementById('filter-date').value;
    const installer = document.getElementById('filter-installer').value;
    let filtered = allJobs;
    if (date) {
      filtered = filtered.filter(j => {
        if (!j.createdAt) return false;
        const d = j.createdAt.toDate ? j.createdAt.toDate() : new Date(j.createdAt);
        return d.toISOString().slice(0,10) === date;
      };
    }
    if (installer) filtered = filtered.filter(j => j.installerName === installer);
    renderJobs(filtered);
  };

  function renderJobs(jobs) {
    const list = document.getElementById('job-list');
    // stats
    const today = new Date().toISOString().slice(0,10);
    const todayCount = allJobs.filter(j => {
      if (!j.createdAt) return false;
      const d = j.createdAt.toDate ? j.createdAt.toDate() : new Date(j.createdAt);
      return d.toISOString().slice(0,10) === today;
    }).length;
    const warnCount = allJobs.filter(j => j.warnings && j.warnings.length > 0).length;
    document.getElementById('stat-total').textContent = allJobs.length;
    document.getElementById('stat-today').textContent = todayCount;
    document.getElementById('stat-warn').textContent  = warnCount;

    if (jobs.length === 0) {
      list.innerHTML = '<div class="empty-state">No hay medidas registradas aún.</div>';
      return;
    }
    list.innerHTML = jobs.map((job, i) => {
      const date = job.createdAt?.toDate ? job.createdAt.toDate() : new Date(job.createdAt || Date.now());
      const dateStr = date.toLocaleDateString('es-PR', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
      const hasWarn = job.warnings && job.warnings.length > 0;
      const tag = hasWarn
        ? `<span class="job-tag tag-warn">⚠ Advertencias</span>`
        : `<span class="job-tag tag-ok">✓ OK</span>`;
      const hueco = job.hueco ? `${(job.hueco.anchoBot||job.hueco.anchoBottom||job.hueco.ancho||'?')}" × ${(job.hueco.altoIzq||job.hueco.altoLeft||job.hueco.alto||'?')}"` : '—';
      return `
        <div class="job-card" onclick="openJob(${i})">
          <div class="job-card-top">
            <div class="job-title">${job.installerName || 'Técnico'} ${tag}</div>
            <div class="job-date">${dateStr}</div>
          </div>
          <div class="job-meta">
            <span>📐 ${hueco}</span>
            <span>👤 ${job.installerName || '—'}</span>
            ${job.notas ? `<span>📝 ${job.notas.slice(0,30)}${job.notas.length>30?'…':''}</span>` : ''}
          </div>
        </div>`;
    }).join('';
    window._jobs = jobs;
  }

  window._currentJobIdx = null;
  window.openJob = (i) => {
    window._currentJobIdx = i;
    const job = window._jobs[i];
    const date = job.createdAt?.toDate ? job.createdAt.toDate() : new Date(job.createdAt || Date.now());
    const dateStr = date.toLocaleDateString('es-PR', { day:'2-digit', month:'short', year:'numeric' }) + ' ' + date.toLocaleTimeString('es-PR', { hour:'2-digit', minute:'2-digit' });
    document.getElementById('modal-title').textContent = `Medida — ${job.installerName || 'Técnico'}`;
    const row = (l,v) => `<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-val">${v}</span></div>`;
    const sec = (t) => `<div class="detail-section-title">${t}</div>`;
    let html = '';
    html += sec('General');
    html += row('Técnico', job.installerName || '—');
    html += row('Fecha', dateStr);
    html += sec('Hueco (Abertura)');
    if (job.hueco) {
      html += row('Ancho superior', (job.hueco.anchoTop||job.hueco.anchoSuperior) ? (job.hueco.anchoTop||job.hueco.anchoSuperior) + '"' : (job.hueco.ancho ? job.hueco.ancho + '"' : '—'));
      html += row('Ancho inferior', (job.hueco.anchoBot||job.hueco.anchoAbajo||job.hueco.anchoBottom) ? (job.hueco.anchoBot||job.hueco.anchoAbajo||job.hueco.anchoBottom) + '"' : '—');
      html += row('Alto izquierdo', (job.hueco.altoIzq||job.hueco.altoIzquierda) ? (job.hueco.altoIzq||job.hueco.altoIzquierda) + '"' : (job.hueco.alto ? job.hueco.alto + '"' : '—'));
      html += row('Alto derecho',   (job.hueco.altoDer||job.hueco.altoDerecha) ? (job.hueco.altoDer||job.hueco.altoDerecha) + '"' : '—');
    } else { html += row('Hueco', '—'); }
    html += sec('Desniveles');
    html += row('Pared Izq.', job.desniveles?.paredIzq || '—');
    html += row('Pared Der.', job.desniveles?.paredDer || '—');
    html += row('Techo',      job.desniveles?.techo    || '—');
    html += row('Piso',       job.desniveles?.piso     || '—');
    if (job.warnings && job.warnings.length > 0) {
      html += `<div style="margin-top:12px;padding:10px 14px;background:#fff3bf;border-radius:8px;font-size:13px;color:#e67700">${job.warnings.map(w=>`⚠ ${w}`).join('<br>')}</div>`;
    }
    if (job.notas) html += `<div class="modal-notes">📝 ${job.notas}</div>`;
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('open');
    mcVp = { x: 0, y: 0, scale: 1 };
    drawJobCanvas(job, mcVp);
  };

  window.deleteCurrentJob = async () => {
    const i = window._currentJobIdx;
    if (i === null || i === undefined) return;
    const job = window._jobs[i];
    if (!confirm(`¿Eliminar la medida de ${job.installerName || 'este técnico'}? Esta acción no se puede deshacer.`)) return;
    try {
      await deleteDoc(doc(db, 'orgs', window._orgId, 'jobs', job.id));
      document.getElementById('modal-overlay').classList.remove('open');
      // remove from local array and re-render
      window._jobs.splice(i, 1);
      window._currentJobIdx = null;
      applyFilters();
      // update stats
      document.getElementById('stat-total').textContent = window._jobs.length;
    } catch(e) {
      alert('Error al eliminar: ' + e.message);
    }
  };

  function parseDesnivel(str) {
    // returns signed inches: positive = afuera/sube, negative = adentro/baja
    if (!str || str === '—') return 0;
    const m = str.match(/([\d\/\. ]+)"/);
    if (!m) return 0;
    const parts = m[1].trim().split(' ');
    let val = 0;
    parts.forEach(p => {
      if (p.includes('/')) { const [n,d] = p.split('/'); val += parseFloat(n)/parseFloat(d); }
      else val += parseFloat(p) || 0;
    };
    const low = str.toLowerCase();
    if (low.includes('adentro') || low.includes('baja')) val = -val;
    return val;
  }

  function dimLine(ctx, x1,y1,x2,y2,label,side) {
    // draws a dimension line with arrows and label (supports \n for two lines)
    const TICK = 6, OFF = 14, LH = 14;
    const dx = x2-x1, dy = y2-y1, len = Math.sqrt(dx*dx+dy*dy);
    if (len < 2) return;
    const nx = -dy/len, ny = dx/len; // normal
    const mx = (x1+x2)/2 + nx*OFF, my = (y1+y2)/2 + ny*OFF;
    ctx.save();
    ctx.strokeStyle = '#1971c2'; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
    // offset line
    ctx.beginPath(); ctx.moveTo(x1+nx*OFF,y1+ny*OFF); ctx.lineTo(x2+nx*OFF,y2+ny*OFF); ctx.stroke();
    ctx.setLineDash([]);
    // tick marks
    ctx.beginPath();
    ctx.moveTo(x1,y1); ctx.lineTo(x1+nx*(OFF+TICK),y1+ny*(OFF+TICK)); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x2,y2); ctx.lineTo(x2+nx*(OFF+TICK),y2+ny*(OFF+TICK)); ctx.stroke();
    // arrowheads on offset line
    const ux=dx/len, uy=dy/len;
    function arrow(ax,ay,dirx,diry) {
      ctx.beginPath();
      ctx.moveTo(ax,ay);
      ctx.lineTo(ax-dirx*7+ny*3,ay-diry*7+nx*3);
      ctx.lineTo(ax-dirx*7-ny*3,ay-diry*7-nx*3);
      ctx.closePath(); ctx.fillStyle='#1971c2'; ctx.fill();
    }
    arrow(x1+nx*OFF,y1+ny*OFF, -ux,-uy);
    arrow(x2+nx*OFF,y2+ny*OFF,  ux, uy);
    // multi-line label
    const lines = label ? label.split('\n') : [];
    const isVertical = (side === 'left' || side === 'right');
    ctx.textAlign='center'; ctx.textBaseline='middle';
    if (!isVertical) {
      const totalH = lines.length * LH;
      lines.forEach((ln, i) => {
        ctx.font = i === 0 ? 'bold 11px Inter,sans-serif' : 'bold 10px Inter,sans-serif';
        ctx.fillStyle = i === 0 ? '#1971c2' : '#e67700';
        ctx.fillText(ln, mx, my - totalH/2 + LH*i + LH/2);
      };
    } else {
      ctx.save();
      ctx.translate(mx, my);
      ctx.rotate(-Math.PI/2);
      const totalH = lines.length * LH;
      lines.forEach((ln, i) => {
        ctx.font = i === 0 ? 'bold 11px Inter,sans-serif' : 'bold 10px Inter,sans-serif';
        ctx.fillStyle = i === 0 ? '#1971c2' : '#e67700';
        ctx.fillText(ln, 0, -totalH/2 + LH*i + LH/2);
      };
      ctx.restore();
    }
    ctx.restore();
  }

  function drawJobCanvas(job, vp) {
    const mc = document.getElementById('modal-canvas');
    if (!mc || !job) return;
    const ctx = mc.getContext('2d');
    const W = mc.width, H = mc.height;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = '#f8faff'; ctx.fillRect(0,0,W,H);

    const scale = (vp?.scale || 1);
    const ox = (vp?.x || 0), oy = (vp?.y || 0);
    ctx.save();
    ctx.translate(W/2 + ox, H/2 + oy);
    ctx.scale(scale, scale);
    ctx.translate(-W/2, -H/2);

    // parse desniveles into pixel offsets
    const SCALE_PX = 18; // px per inch of desnivel
    const pIv = parseDesnivel(job.desniveles?.paredIzq);
    const pDv = parseDesnivel(job.desniveles?.paredDer);
    const tcv = parseDesnivel(job.desniveles?.techo);
    const psv = parseDesnivel(job.desniveles?.piso);

    const pad = 72;
    const bx = pad, by = pad, bw = W - pad*2, bh = H - pad*2;

    // four corners of the skewed glass opening
    // left wall: top-left shifts by pIv, bottom-left shifts by pIv (same wall lean)
    // right wall: top-right shifts by pDv
    // ceiling: top shifts by tcv (vertical)
    // floor: bottom shifts by psv
    const TL = { x: bx + pIv*SCALE_PX,          y: by  + tcv*SCALE_PX };
    const TR = { x: bx + bw - pDv*SCALE_PX,      y: by  + tcv*SCALE_PX };
    const BR = { x: bx + bw - pDv*SCALE_PX,      y: by + bh - psv*SCALE_PX };
    const BL = { x: bx + pIv*SCALE_PX,           y: by + bh - psv*SCALE_PX };

    // fill glass shape
    ctx.beginPath();
    ctx.moveTo(TL.x,TL.y); ctx.lineTo(TR.x,TR.y);
    ctx.lineTo(BR.x,BR.y); ctx.lineTo(BL.x,BL.y);
    ctx.closePath();
    ctx.fillStyle = 'rgba(144,194,255,0.25)'; ctx.fill();
    ctx.strokeStyle = '#1971c2'; ctx.lineWidth = 2.5;
    ctx.stroke();

    // draw opening box (square reference)
    ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
    ctx.strokeRect(bx, by, bw, bh);
    ctx.setLineDash([]);

    // desnivel arrows on each side if nonzero
    function desArrow(x1,y1,x2,y2,label) {
      if (!label || label==='—') return;
      ctx.save();
      ctx.strokeStyle='#e67700'; ctx.fillStyle='#e67700';
      ctx.lineWidth=1.5; ctx.font='bold 10px Inter,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      const mx=(x1+x2)/2, my=(y1+y2)/2;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      ctx.fillText(label,mx,my-10);
      ctx.restore();
    }

    // desnivel labels at sides — pill badges with breathing room
    const pI = job.desniveles?.paredIzq, pD = job.desniveles?.paredDer;
    const tc = job.desniveles?.techo,    ps = job.desniveles?.piso;

    function desPill(text, cx, cy, align) {
      if (!text || text === '—') return;
      ctx.save();
      ctx.font = 'bold 10px Inter,sans-serif';
      const tw = ctx.measureText(text).width;
      const pw = tw + 12, ph = 18;
      const px = align === 'right' ? cx - pw : align === 'center' ? cx - pw/2 : cx;
      const py = cy - ph/2;
      ctx.fillStyle = 'rgba(255,237,213,0.95)';
      ctx.beginPath();
      ctx.roundRect(px, py, pw, ph, 5);
      ctx.fill();
      ctx.strokeStyle = '#e67700'; ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = '#c05200';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(text, px + pw/2, cy);
      ctx.restore();
    }

    const leftMidY  = (TL.y + BL.y) / 2;
    const rightMidY = (TR.y + BR.y) / 2;
    const topMidX   = (TL.x + TR.x) / 2;
    const botMidX   = (BL.x + BR.x) / 2;

    // Desnivel now shown inline on dimension lines (second line, orange)
    // desPill calls removed to avoid redundancy

    // dimension lines
    const anchoT = job.hueco?.anchoTop   || job.hueco?.ancho;
    const anchoB = job.hueco?.anchoBot   || job.hueco?.anchoBottom;
    const altoL  = job.hueco?.altoIzq   || job.hueco?.altoIzquierda  || job.hueco?.alto;
    const altoR  = job.hueco?.altoDer   || job.hueco?.altoDerecha;

    // Always show all 4 dimension lines (measurement + desnivel on second line)
    const topLabel   = anchoT ? anchoT + '"' + (tc && tc !== '—' ? '\n' + tc : '') : null;
    const botLabel   = anchoB ? anchoB + '"' + (ps && ps !== '—' ? '\n' + ps : '') : null;
    const leftLabel  = altoL  ? altoL  + '"' + (pI && pI !== '—' ? '\n' + pI : '') : null;
    const rightLabel = altoR  ? altoR  + '"' + (pD && pD !== '—' ? '\n' + pD : '') : null;
    if (topLabel)   dimLine(ctx, TL.x,TL.y, TR.x,TR.y, topLabel,   'top');
    if (botLabel)   dimLine(ctx, BL.x,BL.y, BR.x,BR.y, botLabel,   'bot');
    if (leftLabel)  dimLine(ctx, TL.x,TL.y, BL.x,BL.y, leftLabel,  'left');
    if (rightLabel) dimLine(ctx, TR.x,TR.y, BR.x,BR.y, rightLabel, 'right');

    ctx.restore();
  }

  // ── modal canvas drag ──────────────────────────────────────────────────
  let mcVp = { x: 0, y: 0, scale: 1 };
  let mcDrag = null;
  let mcPinchDist = null;

  function mcGetCanvas() { return document.getElementById('modal-canvas'); }

  function mcApplyDrag(dx, dy) {
    mcVp.x += dx; mcVp.y += dy;
    const mc = mcGetCanvas();
    if (mc) drawJobCanvas(window._jobs?.[window._currentJobIdx], mcVp);
  }

  document.addEventListener('mousedown', e => {
    if (e.target?.id !== 'modal-canvas') return;
    mcDrag = { x: e.clientX, y: e.clientY };
    e.preventDefault();
  };
  document.addEventListener('mousemove', e => {
    if (!mcDrag) return;
    mcApplyDrag(e.clientX - mcDrag.x, e.clientY - mcDrag.y);
    mcDrag = { x: e.clientX, y: e.clientY };
  };
  document.addEventListener('mouseup', () => { mcDrag = null; });

  document.addEventListener('touchstart', e => {
    if (e.target?.id !== 'modal-canvas') return;
    if (e.touches.length === 1) {
      mcDrag = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    } else if (e.touches.length === 2) {
      mcPinchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      ;
    }
  }, { passive: true };
  document.addEventListener('touchmove', e => {
    if (e.target?.id !== 'modal-canvas') return;
    if (e.touches.length === 1 && mcDrag) {
      mcApplyDrag(e.touches[0].clientX - mcDrag.x, e.touches[0].clientY - mcDrag.y);
      mcDrag = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    } else if (e.touches.length === 2 && mcPinchDist !== null) {
      const d = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      ;
      mcVp.scale = Math.min(4, Math.max(0.3, mcVp.scale * (d / mcPinchDist)));
      mcPinchDist = d;
      const mc = mcGetCanvas();
      if (mc) drawJobCanvas(window._jobs?.[window._currentJobIdx], mcVp);
    }
  }, { passive: true };
  document.addEventListener('touchend', e => {
    if (e.touches.length === 0) { mcDrag = null; mcPinchDist = null; }
  };

  window.closeModal = (e) => {
    if (!e || e.target === document.getElementById('modal-overlay')) {
      document.getElementById('modal-overlay').classList.remove('open');
    }
  };

  window.copyJoinCode = () => {
    const code = document.getElementById('join-code-display').textContent;
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copiado';
      setTimeout(() => btn.textContent = '📋 Copiar', 2000);
    };
  };

  window.doLogout = async () => {
    await signOut(auth);
    window.location.href = 'login.html';
  };
</script>
</body>
</html>
