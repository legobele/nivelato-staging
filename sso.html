<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Iniciar sesión — Nivelato</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #f0f2f5;
    color: #212529;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 40px 32px;
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .logo { font-size: 28px; font-weight: 700; color: #1971c2; margin-bottom: 4px; letter-spacing: -0.02em; }
  .tagline { font-size: 13px; color: #868e96; margin-bottom: 28px; }
  .app-name { font-size: 14px; font-weight: 600; color: #495057; background: #f1f3f5; border-radius: 8px; padding: 10px 16px; margin-bottom: 24px; word-break: break-all; }
  .sso-btn-img { width: 100%; max-width: 300px; cursor: pointer; display: block; margin: 0 auto; transition: opacity 0.15s; }
  .sso-btn-img:active { opacity: 0.8; }
  .sso-btn-img.disabled { opacity: 0.5; cursor: default; }
  .error { font-size: 13px; color: #e03131; margin-top: 12px; display: none; }
  .info { font-size: 12px; color: #868e96; margin-top: 20px; line-height: 1.5; }
</style>
<script src="testing.js"></script>
</head>
<body>
<div class="card">
  <div class="logo">Nivelato</div>
  <div class="tagline">Inicio de sesión único</div>
  <div class="app-name" id="sso-app-name">Solicitado por: —</div>
  <img src="signin_nivelato_en.png" class="sso-btn-img" id="sso-btn" onclick="signIn()" alt="Sign in with Nivelato" />
  <div id="sso-form" style="display:none;margin-top:16px;">
    <input type="email" id="sso-email" placeholder="Correo electrónico" style="width:100%;padding:10px 12px;border:1px solid #dee2e6;border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:8px;" />
    <input type="password" id="sso-pass" placeholder="Contraseña" style="width:100%;padding:10px 12px;border:1px solid #dee2e6;border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:8px;" />
    <button onclick="signInWithEmail()" style="width:100%;padding:12px;background:#1971c2;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">Iniciar sesión</button>
  </div>
  <div class="error" id="sso-error"></div>
  <div class="info">Al iniciar sesión, compartirás tu nombre, correo y afiliación con la aplicación solicitante.</div>
</div>

<script type="module">
import { auth } from './firebase-config.js';
import { signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js';
import { getDoc, doc, setDoc, deleteDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js';
import { db } from './firebase-config.js';

const params = new URLSearchParams(window.location.search);
let redirectUri = params.get('redirect_uri');
const clientId = params.get('client_id') || 'Aplicación externa';
const lang = params.get('lang') || 'en';
const responseType = params.get('response_type') || 'token';

if (redirectUri && !redirectUri.startsWith('http://') && !redirectUri.startsWith('https://')) {
  redirectUri = 'https://' + redirectUri;
}

document.getElementById('sso-btn').src = 'signin_nivelato_' + lang + '.png';
document.getElementById('sso-app-name').textContent = 'Solicitado por: ' + clientId;

if (!redirectUri) {
  document.getElementById('sso-error').textContent = 'Error: falta redirect_uri';
  document.getElementById('sso-error').style.display = 'block';
  document.getElementById('sso-btn').classList.add('disabled');
}

function generateCode() {
  const bytes = new Uint8Array(24);
  crypto.getRandomValues(bytes);
  return Array.from(bytes).map(b => b.toString(36).padStart(2, '0')).join('');
}

async function doAuthCodeFlow(user, userData) {
  // Store token data in Firestore under a random code — no URL exposure
  const code = generateCode();
  await setDoc(doc(db, 'sso_codes', code), {
    uid: user.uid,
    token: await user.getIdToken(),
    name: userData.name || user.displayName || '',
    email: user.email || '',
    role: userData.role || '',
    orgId: userData.orgId || '',
    createdAt: serverTimestamp(),
  });
  // Redirect with just the code — token data is fetched from Firestore by the consumer
  window.location.href = redirectUri + '?code=' + code;
}

async function doPopupFlow(user, userData) {
  const payload = {
    uid: user.uid,
    token: await user.getIdToken(),
    name: userData.name || user.displayName || '',
    email: user.email || '',
    role: userData.role || '',
    orgId: userData.orgId || '',
  };
  window.opener.postMessage({ type: 'nivelato_sso', payload }, redirectUri);
  window.close();
}

async function handleAuth(user) {
  const snap = await getDoc(doc(db, 'users', user.uid));
  const userData = snap.exists() ? snap.data() : {};

  if (window.opener && window.opener !== window && responseType !== 'code') {
    // Popup flow — postMessage, no URL exposure at all
    await doPopupFlow(user, userData);
  } else {
    // Redirect flow — short-lived code in Firestore, only ?code= in URL
    await doAuthCodeFlow(user, userData);
  }
}

onAuthStateChanged(auth, (user) => {
  if (user && redirectUri) {
    document.getElementById('sso-btn').style.opacity = '0.5';
    handleAuth(user);
  }
});

window.signIn = () => {
  // Show email/password form instead (Google not enabled in Firebase console)
  document.getElementById('sso-btn').style.display = 'none';
  document.getElementById('sso-form').style.display = 'block';
};

window.signInWithEmail = async () => {
  const email = document.getElementById('sso-email').value.trim();
  const pass = document.getElementById('sso-pass').value;
  const err = document.getElementById('sso-error');
  if (!email || !pass) { err.textContent = 'Ingresa correo y contraseña.'; err.style.display = 'block'; return; }
  err.style.display = 'none';
  try {
    const result = await signInWithEmailAndPassword(auth, email, pass);
    await handleAuth(result.user);
  } catch (e) {
    err.textContent = 'Error: ' + (e.message || 'Intenta de nuevo.');
    err.style.display = 'block';
  }
};
</script>
</body>
</html>
