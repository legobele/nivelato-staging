<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Iniciar sesión — Nivelato</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #f0f2f5;
    color: #212529;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 40px 32px;
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .logo {
    font-size: 28px;
    font-weight: 700;
    color: #1971c2;
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }
  .tagline {
    font-size: 13px;
    color: #868e96;
    margin-bottom: 28px;
  }
  .app-name {
    font-size: 14px;
    font-weight: 600;
    color: #495057;
    background: #f1f3f5;
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 24px;
    word-break: break-all;
  }
  .sso-btn-img {
    width: 100%;
    max-width: 300px;
    cursor: pointer;
    display: block;
    margin: 0 auto;
    transition: opacity 0.15s;
  }
  .sso-btn-img:active { opacity: 0.8; }
  .sso-btn-img.disabled { opacity: 0.5; cursor: default; }
  .error {
    font-size: 13px;
    color: #e03131;
    margin-top: 12px;
    display: none;
  }
  .info {
    font-size: 12px;
    color: #868e96;
    margin-top: 20px;
    line-height: 1.5;
  }
</style>
<script src="testing.js"></script>
</head>
<body>
<div class="card">
  <div class="logo">Nivelato</div>
  <div class="tagline">Inicio de sesión único</div>
  <div class="app-name" id="sso-app-name">Solicitado por: —</div>
  <img src="signin_nivelato_en.png" class="sso-btn-img" id="sso-btn" onclick="signIn()" alt="Sign in with Nivelato" />
  <div class="error" id="sso-error"></div>
  <div class="info">Al iniciar sesión, compartirás tu nombre, correo y afiliación con la aplicación solicitante.</div>
</div>

<script type="module">
import { auth } from './firebase-config.js';
import { signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js';
import { getDoc, doc } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js';
import { db } from './firebase-config.js';

const params = new URLSearchParams(window.location.search);
let redirectUri = params.get('redirect_uri');
const clientId = params.get('client_id') || 'Aplicación externa';
const lang = params.get('lang') || 'en';

// Ensure redirect URI is absolute
if (redirectUri && !redirectUri.startsWith('http://') && !redirectUri.startsWith('https://')) {
  redirectUri = 'https://' + redirectUri;
}

// Use the localized button image
document.getElementById('sso-btn').src = 'signin_nivelato_' + lang + '.png';

document.getElementById('sso-app-name').textContent = 'Solicitado por: ' + clientId;

if (!redirectUri) {
  document.getElementById('sso-error').textContent = 'Error: falta redirect_uri';
  document.getElementById('sso-error').style.display = 'block';
  document.getElementById('sso-btn').classList.add('disabled');
}

async function doRedirect(user) {
  if (!redirectUri) return;
  const token = await user.getIdToken();
  const userSnap = await getDoc(doc(db, 'users', user.uid));
  const userData = userSnap.exists() ? userSnap.data() : {};
  const payload = {
    token,
    uid: user.uid,
    name: userData.name || user.displayName || '',
    email: user.email || '',
    role: userData.role || '',
    orgId: userData.orgId || '',
  };
  const encoded = encodeURIComponent(JSON.stringify(payload));
  // Popup flow: send via postMessage and close
  if (window.opener && window.opener !== window) {
    window.opener.postMessage({ type: 'nivelato_sso', payload }, redirectUri);
    window.close();
    return;
  }
  // Redirect flow: use URL fragment (#) so the token never hits a server
  window.location.href = redirectUri + '#nivelato_token=' + encoded;
}

// Already signed in? Skip straight to redirect
onAuthStateChanged(auth, (user) => {
  if (user && redirectUri) {
    document.getElementById('sso-btn').style.opacity = '0.5';
    doRedirect(user);
  }
});

window.signIn = async () => {
  const btn = document.getElementById('sso-btn');
  const err = document.getElementById('sso-error');
  btn.classList.add('disabled');
  btn.style.opacity = '0.5';
  err.style.display = 'none';

  try {
    // Try Google popup first (most SSO-friendly)
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);
    await doRedirect(result.user);
  } catch (e) {
    if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
      err.textContent = 'La ventana emergente fue bloqueada o cerrada. Intenta de nuevo.';
      err.style.display = 'block';
      btn.classList.remove('disabled');
      btn.style.opacity = '1';
      return;
    }
    // Fallback: show error
    err.textContent = 'Error al iniciar sesión: ' + (e.message || 'Intenta de nuevo.');
    err.style.display = 'block';
    btn.classList.remove('disabled');
    btn.style.opacity = '1';
  }
};
</script>
</body>
</html>
