<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Nivelato — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #1971c2;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .tagline {
      font-size: 13px;
      color: #868e96;
      margin-bottom: 32px;
    }
    .tab-row {
      display: flex;
      border-bottom: 2px solid #e9ecef;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #868e96;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: #1971c2; border-bottom-color: #1971c2; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: #495057; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #dee2e6;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #1971c2; }
    .field select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #dee2e6;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      background: #fff;
      transition: border-color 0.15s;
    }
    .field select:focus { border-color: #1971c2; }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #1971c2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #1864ab; }
    .btn-primary:disabled { background: #a5d8ff; cursor: not-allowed; }
    .error-msg {
      background: #fff5f5;
      border: 1px solid #ffc9c9;
      color: #c92a2a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .error-msg.visible { display: block; }
    .signup-note {
      font-size: 12px;
      color: #868e96;
      margin-top: 16px;
      text-align: center;
      line-height: 1.5;
    }

  </style>
</head>
<body>
<div class="card">
  <div class="logo">Nivelato</div>
  <div class="tagline">Medidas de campo para instaladores de vidrio</div>

  <div class="tab-row">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">Iniciar sesión</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Registrarse</div>
  </div>

  <!-- LOGIN FORM -->
  <div id="form-login">
    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" id="login-email" placeholder="correo@taller.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-primary" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="error-msg" id="login-error"></div>
  </div>

  <!-- SIGNUP FORM -->
  <div id="form-signup" style="display:none">
    <div class="field">
      <label>Nombre completo</label>
      <input type="text" id="signup-name" placeholder="Juan Pérez" autocomplete="name" />
    </div>
    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" id="signup-email" placeholder="correo@taller.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="signup-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
    </div>
    <div class="field">
      <label>Rol</label>
      <select id="signup-role" onchange="onRoleChange()">
        <option value="medidor">Técnico medidor</option>
        <option value="supervisor">Supervisor de campo</option>
        <option value="cotizador">Cotizaciones</option>
        <option value="owner">Dueño / Administrador</option>
      </select>
    </div>
    <!-- Owner-only: org name + join code -->
    <div id="owner-fields" style="display:block">
      <div class="field">
        <label>Nombre del taller</label>
        <input type="text" id="signup-orgname" placeholder="Vidrios Lebron" />
      </div>
    </div>
    <!-- Non-owner: join code -->
    <div id="user-fields" style="display:none">
      <div class="field">
        <label>Código del taller <span style="color:#868e96;font-weight:400">(te lo da el dueño)</span></label>
        <input type="text" id="signup-orgcode" placeholder="ABC123" autocomplete="off" style="text-transform:uppercase" />
      </div>
    </div>
    <button class="btn-primary" id="btn-signup" onclick="doSignup()">Crear cuenta</button>
    <div class="error-msg" id="signup-error"></div>
    <div class="signup-note">Al registrarte como dueño, se crea una organización nueva.<br>Los empleados usan el código que tú les des.</div>
  </div>
</div>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import {
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
  import {
    doc, setDoc, getDoc, collection, query, where, getDocs, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  // expose to inline handlers
  window.switchTab = (tab) => {
    document.getElementById('form-login').style.display  = tab === 'login'  ? '' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? '' : 'none';
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  };

  window.onRoleChange = () => {
    const role = document.getElementById('signup-role').value;
    document.getElementById('owner-fields').style.display = role === 'owner' ? '' : 'none';
    document.getElementById('user-fields').style.display  = role !== 'owner' ? '' : 'none';
  };
  // init visibility — run after DOM fully parsed
  document.addEventListener('DOMContentLoaded', () => window.onRoleChange());
  window.onRoleChange(); // also run immediately in case DOMContentLoaded already fired

  window.doLogin = async () => {
    const btn = document.getElementById('btn-login');
    const errEl = document.getElementById('login-error');
    btn.disabled = true;
    btn.textContent = 'Entrando...';
    errEl.classList.remove('visible');
    try {
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-pass').value;
      await signInWithEmailAndPassword(auth, email, pass);
      // get user role → redirect
      const userDoc = await getDoc(doc(db, 'users', auth.currentUser.uid));
      const role = userDoc.data()?.role;
      window.location.href = (role === 'owner' || role === 'cotizador') ? 'dashboard.html' : 'index.html';
    } catch(e) {
      errEl.textContent = friendlyError(e.code);
      errEl.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  };

  window.doSignup = async () => {
    const btn = document.getElementById('btn-signup');
    const errEl = document.getElementById('signup-error');
    btn.disabled = true;
    btn.textContent = 'Creando cuenta...';
    errEl.classList.remove('visible');
    try {
      const name  = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const pass  = document.getElementById('signup-pass').value;
      const role  = document.getElementById('signup-role').value;

      if (!name) throw { code: 'missing-name' };

      let orgId;

      if (role === 'owner') {
        const orgName = document.getElementById('signup-orgname').value.trim();
        if (!orgName) throw { code: 'missing-orgname' };
        // create user account
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName: name });
        // generate a short org code
        orgId = cred.user.uid.slice(0, 6).toUpperCase();
        // create org + user docs — separate try so Firestore errors surface clearly
        try {
          await setDoc(doc(db, 'orgs', orgId), {
            name: orgName,
            ownerId: cred.user.uid,
            joinCode: orgId,
            createdAt: serverTimestamp(),
            userCount: 1
          });
          await setDoc(doc(db, 'users', cred.user.uid), {
            name, email, role, orgId,
            createdAt: serverTimestamp()
          });
        } catch(fsErr) {
          console.error('Firestore write failed:', fsErr.code, fsErr.message);
          // still show the code even if Firestore failed
          alert(`¡Auth OK pero Firestore falló!\n\nError: ${fsErr.code}\n\nTu UID: ${cred.user.uid}\nTu código: ${orgId}\n\nRevisa las Rules en Firebase Console.`);
          window.location.href = 'dashboard.html';
          return;
        }
        // show join code before redirect
        alert(`¡Cuenta creada!\n\nCódigo de tu taller: ${orgId}\n\nDáselo a tus empleados para que puedan registrarse.`);
        window.location.href = 'dashboard.html';

      } else {
        const joinCode = document.getElementById('signup-orgcode').value.trim().toUpperCase();
        if (!joinCode) throw { code: 'missing-code' };
        // create auth FIRST so request.auth != null for Firestore reads
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName: name });
        // NOW look up org by join code (auth is live)
        const orgRef = doc(db, 'orgs', joinCode);
        const orgSnap = await getDoc(orgRef);
        if (!orgSnap.exists()) {
          // delete the created auth account so they can retry
          await cred.user.delete();
          throw { code: 'invalid-code' };
        }
        orgId = joinCode;
        await setDoc(doc(db, 'users', cred.user.uid), {
          name, email, role, orgId,
          createdAt: serverTimestamp()
        });
        window.location.href = 'index.html';
      }
    } catch(e) {
      errEl.textContent = friendlyError(e.code);
      errEl.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Crear cuenta';
    }
  };

  function friendlyError(code) {
    const map = {
      'auth/invalid-email':          'Correo electrónico inválido.',
      'auth/user-not-found':         'No existe una cuenta con ese correo.',
      'auth/wrong-password':         'Contraseña incorrecta.',
      'auth/email-already-in-use':   'Ya existe una cuenta con ese correo.',
      'auth/weak-password':          'La contraseña debe tener al menos 6 caracteres.',
      'auth/too-many-requests':      'Demasiados intentos. Intenta más tarde.',
      'missing-name':                'Ingresa tu nombre completo.',
      'missing-orgname':             'Ingresa el nombre del taller.',
      'missing-code':                'Ingresa el código del taller.',
      'invalid-code':                'Código de taller inválido. Verifica con el dueño.',
    };
    return map[code] || `Error: ${code}`;
  }
</script>
</body>
</html>
