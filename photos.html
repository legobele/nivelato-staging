<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Nivelato — Fotos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="testing.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow: hidden; position: fixed; width: 100%; height: 100%; touch-action: none; max-width: 100vw; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #1a1a1a; color: #fff; min-height: 100dvh; }
  #app-shell { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px; background: #2a2a2a; border-bottom: 1px solid #3a3a3a;
    flex-shrink: 0; gap: 6px; overflow: hidden;
  }
  header h1 { font-size: 14px; font-weight: 700; color: #e64980; white-space: nowrap; flex-shrink: 0; }
  .header-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  header select, header button {
    padding: 5px 8px; border-radius: 6px; border: 1px solid #3a3a3a;
    font-size: 11px; font-family: inherit; background: #333; color: #fff; cursor: pointer;
    white-space: nowrap; max-width: 120px; overflow: hidden; text-overflow: ellipsis;
  }
  header select { max-width: 140px; }
  header button { background: #e64980; border-color: #e64980; font-weight: 600; }
  header button:active { opacity: 0.8; }
  header button.danger { background: #c92a2a; border-color: #c92a2a; }

  #main-area {
    flex: 1; position: relative; overflow: hidden; background: #111;
    touch-action: none; max-width: 100vw;
  }
  #photo-viewport {
    position: absolute; inset: 0; overflow: hidden;
    touch-action: none; max-width: 100%;
  }
  #photo-transform {
    position: absolute; transform-origin: 0 0;
    touch-action: none; max-width: 100%;
  }
  #image-canvas {
    display: block; width: 100%; height: auto;
    pointer-events: none; user-select: none; -webkit-user-drag: none;
  }

  /* Overlay labels — dimension line style */
  .measure-label {
    position: absolute; z-index: 10; cursor: pointer;
    touch-action: none; user-select: none;
    overflow: visible;
    /* Width set by JS per label */
  }
  .measure-label .ml-wrap {
    position: relative; width: 100%; height: 24px;
  }
  .measure-label .ml-line {
    position: absolute; top: 50%; left: 0; right: 0; height: 3px;
    margin-top: -1.5px; background: #e64980; border-radius: 1px;
  }
  .measure-label .ml-tick {
    position: absolute; top: 50%; width: 2px; height: 8px;
    margin-top: -4px; background: #e64980; border-radius: 1px;
  }
  .measure-label .ml-tick-l { left: 0; }
  .measure-label .ml-tick-r { right: 0; }
  .measure-label .ml-text {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.82); color: #fff; padding: 2px 7px;
    border-radius: 5px; font-size: 11px; font-weight: 700;
    white-space: nowrap; border: 1.5px solid #e64980;
    text-align: center; pointer-events: auto; z-index: 2;
  }
  .measure-label.selected .ml-text {
    border-color: #ff6b9d; box-shadow: 0 0 10px rgba(230,73,128,0.4);
  }
  /* Resize handle */
  .measure-label .ml-handle {
    position: absolute; width: 28px; height: 28px;
    background: rgba(230,73,128,0.5); border: 2px solid #e64980;
    border-radius: 50%; cursor: grab; touch-action: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #fff; font-weight: 700;
  }
  .measure-label .ml-handle:active { cursor: grabbing; }

  /* Empty state */
  #empty-state {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; color: #666; text-align: center; padding: 24px;
  }
  #empty-state .big { font-size: 48px; }
  #empty-state h2 { font-size: 18px; color: #888; }
  #empty-state p { font-size: 13px; max-width: 320px; line-height: 1.6; }
  #empty-state label {
    display: inline-block; padding: 12px 24px;
    background: #e64980; color: #fff; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  #empty-state input[type="file"] { display: none; }

  /* Side panel */
  #side-panel {
    position: absolute; right: 0; top: 0; bottom: 0;
    width: 280px; background: #2a2a2a; border-left: 1px solid #3a3a3a;
    z-index: 20; overflow-y: auto; display: none; padding: 14px;
  }
  #side-panel.open { display: block; }
  #side-panel h3 { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: #e64980; }
  .label-list { display: flex; flex-direction: column; gap: 3px; }
  .label-list .ll-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 8px; background: #333; border-radius: 5px;
    font-size: 11px; cursor: pointer; border: 1px solid transparent;
  }
  .label-list .ll-item:hover { border-color: #555; }
  .label-list .ll-item.active { border-color: #e64980; }
  .label-list .ll-item .ll-del { color: #c92a2a; cursor: pointer; font-size: 13px; padding: 0 4px; }

  #toolbar {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 30;
  }
  #toolbar button {
    padding: 8px 12px; border-radius: 8px; border: none;
    font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
    background: rgba(51,51,51,0.9); color: #fff; backdrop-filter: blur(8px);
  }
  #toolbar button:active { opacity: 0.8; }

  @media (max-width: 600px) {
    header { padding: 6px 8px; }
    header h1 { font-size: 12px; }
    header select, header button { font-size: 10px; padding: 4px 6px; }
    #side-panel { width: 100%; }
    .measure-label .ml-text { font-size: 10px; padding: 2px 6px; }
    .measure-label .ml-handle { width: 24px; height: 24px; font-size: 11px; }
  }
</style>
</head>
<body>
<div id="app-shell">
  <header>
    <h1>📸 Nivelato Fotos</h1>
    <div class="header-right">
      <select id="job-select" onchange="loadJobMeasurements()" style="display:none"><option value="">Medida</option></select>
      <button onclick="reloadFromJob()" id="reload-btn" style="display:none" title="Recargar medidas">🔄</button>
      <button onclick="saveOverlay()" id="save-btn" style="display:none">💾</button>
      <button class="danger" onclick="doSignOut()">Salir</button>
    </div>
  </header>

  <div id="main-area">
    <div id="photo-viewport">
      <div id="photo-transform">
        <img id="image-canvas" style="display:none" />
      </div>
    </div>

    <div id="empty-state">
      <div class="big">📸</div>
      <h2>Sube una foto</h2>
      <p>Carga una imagen y coloca las medidas como etiquetas.</p>
      <label>📁 Seleccionar imagen<input type="file" id="photo-upload" accept="image/*" onchange="loadPhoto(event)" /></label>
    </div>

    <div id="side-panel">
      <h3>📐 Medidas</h3>
      <div id="measurements-list" class="label-list"></div>
      <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;">
        <button onclick="addCustomLabel()" style="flex:1;min-width:100px;padding:7px;background:#333;color:#fff;border:1px solid #555;border-radius:5px;font-size:11px;cursor:pointer;font-weight:600;">+ Texto</button>
        <button onclick="addDimensionLine()" style="flex:1;min-width:100px;padding:7px;background:#333;color:#fff;border:1px solid #555;border-radius:5px;font-size:11px;cursor:pointer;font-weight:600;">+ Línea</button>
        <button onclick="addArrowLine()" style="flex:1;min-width:100px;padding:7px;background:#333;color:#fff;border:1px solid #555;border-radius:5px;font-size:11px;cursor:pointer;font-weight:600;">← → Flecha</button>
      </div>
      <div style="margin-top:8px">
        <button onclick="exportPhoto()" style="width:100%;padding:7px;background:#1971c2;color:#fff;border:none;border-radius:5px;font-size:11px;cursor:pointer;font-weight:600;">⬇ Exportar</button>
      </div>
    </div>

    <div id="toolbar">
      <button onclick="document.getElementById('photo-upload').click()">📁</button>
      <button onclick="toggleSidePanel()">📐</button>
      <button onclick="zoomIn()">🔍+</button>
      <button onclick="zoomOut()">🔍−</button>
      <button onclick="zoomFit()">⊡</button>
    </div>
  </div>
</div>

<script type="module">
import { auth, db } from './firebase-config.js';
import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js';
import { getDoc, doc, getDocs, collection, query, orderBy, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js';
import { makePermChecker } from './permissions.js';

let currentUser = null, userData = null, _can = () => false;
let orgId = null;
let allJobs = [];
let labels = [];
let selectedIdx = null;
let loadedJobId = null;
let zoom = 1, panX = 0, panY = 0;
let dragState = null;
let imgNaturalW = 0, imgNaturalH = 0;

// ── AUTH ──
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = 'sso.html?redirect_uri=' + encodeURIComponent(window.location.href);
    return;
  }
  currentUser = user;
  const snap = await getDoc(doc(db, 'users', user.uid));
  userData = snap.data();
  _can = makePermChecker(userData);
  orgId = userData.orgId;
  await loadOrgJobs();

  // If ?job=xxx is in URL, auto-select after load
  const jobParam = new URLSearchParams(window.location.search).get('job');
  if (jobParam) {
    setTimeout(() => { document.getElementById('job-select').value = jobParam; loadJobMeasurements(); }, 500);
  }
});

async function loadOrgJobs() {
  try {
    const jobsRef = collection(db, 'orgs', orgId, 'jobs');
    const q = query(jobsRef, orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    allJobs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const sel = document.getElementById('job-select');
    sel.innerHTML = '<option value="">Medida</option>' +
      allJobs.map(j => `<option value="${j.id}">${(j.customer||'—').slice(0,20)} / ${(j.project||'—').slice(0,15)}</option>`).join('');
  } catch(e) { console.error(e); }
}

window.loadJobMeasurements = function() {
  const jobId = document.getElementById('job-select').value;
  if (!jobId) return;
  loadedJobId = jobId;
  const job = allJobs.find(j => j.id === jobId);
  if (!job) return;
  buildLabels(job);
  loadExistingOverlay(jobId);
  document.getElementById('reload-btn').style.display = 'inline-block';
};

window.reloadFromJob = function() {
  if (!loadedJobId) return;
  const job = allJobs.find(j => j.id === loadedJobId);
  if (!job) return;
  buildLabels(job);
  renderLabels();
};

function buildLabels(job) {
  labels = [];
  if (job.hueco) {
    labels.push({ type: 'dim', text: `${job.hueco.anchoBot || '?'}"`, x: 0.35, y: 0.78, w: 0.3 });
    labels.push({ type: 'dim', text: `${job.hueco.altoIzq || '?'}"`, x: 0.18, y: 0.35, w: 0.12, rot: -90 });
    if (job.hueco.anchoTop) labels.push({ type: 'dim', text: `${job.hueco.anchoTop}"`, x: 0.35, y: 0.18, w: 0.3 });
    if (job.hueco.altoDer) labels.push({ type: 'dim', text: `${job.hueco.altoDer}"`, x: 0.72, y: 0.35, w: 0.12, rot: -90 });
  }
  if (job.desniveles) {
    if (job.desniveles.paredIzq && job.desniveles.paredIzq !== '—')
      labels.push({ type: 'arrow', text: `← ${job.desniveles.paredIzq} →`, x: 0.06, y: 0.48, w: 0.08 });
    if (job.desniveles.paredDer && job.desniveles.paredDer !== '—')
      labels.push({ type: 'arrow', text: `← ${job.desniveles.paredDer} →`, x: 0.82, y: 0.48, w: 0.14 });
    if (job.desniveles.techo && job.desniveles.techo !== '—')
      labels.push({ type: 'arrow', text: `${job.desniveles.techo}`, x: 0.45, y: 0.06, w: 0.12 });
    if (job.desniveles.piso && job.desniveles.piso !== '—')
      labels.push({ type: 'arrow', text: `${job.desniveles.piso}`, x: 0.45, y: 0.9, w: 0.12 });
  }
  if (job.customer) labels.push({ type: 'text', text: `Cliente: ${job.customer}`, x: 0.5, y: 0.03 });
  if (job.project) labels.push({ type: 'text', text: `Proyecto: ${job.project}`, x: 0.5, y: 0.97 });
  renderLabels();
}

async function loadExistingOverlay(jobId) {
  try {
    const snap = await getDoc(doc(db, 'orgs', orgId, 'jobs', jobId));
    const job = snap.data();
    if (job?.photoOverlay?.labels) {
      labels = job.photoOverlay.labels;
      renderLabels();
    }
  } catch(e) {}
}

// ── PHOTO ──
window.loadPhoto = function(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = document.getElementById('image-canvas');
    img.onload = () => {
      imgNaturalW = img.naturalWidth;
      imgNaturalH = img.naturalHeight;
      zoomFit();
    };
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('save-btn').style.display = 'inline-block';
    document.getElementById('job-select').style.display = 'inline-block';
    document.getElementById('side-panel').classList.add('open');
  };
  reader.readAsDataURL(file);
};

// ── ZOOM / PAN ──
function applyTransform() {
  const t = document.getElementById('photo-transform');
  t.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
}
window.zoomIn = () => { zoom = Math.min(zoom * 1.3, 10); applyTransform(); };
window.zoomOut = () => { zoom = Math.max(zoom / 1.3, 0.1); applyTransform(); };
window.zoomFit = function() {
  const vp = document.getElementById('photo-viewport');
  const img = document.getElementById('image-canvas');
  if (!img.naturalWidth) return;
  const vw = vp.clientWidth, vh = vp.clientHeight;
  const scaleX = vw / img.naturalWidth, scaleY = vh / img.naturalHeight;
  zoom = Math.min(scaleX, scaleY) * 0.9;
  panX = (vw - img.naturalWidth * zoom) / 2;
  panY = (vh - img.naturalHeight * zoom) / 2;
  applyTransform();
};

// ── LABEL RENDERING ──
function renderLabels() {
  const container = document.getElementById('photo-transform');
  container.querySelectorAll('.measure-label').forEach(el => el.remove());

  labels.forEach((l, i) => {
    const el = document.createElement('div');
    el.className = 'measure-label' + (i === selectedIdx ? ' selected' : '');
    el.style.left = (l.x * 100) + '%'; el.style.top = (l.y * 100) + '%';
    el.dataset.idx = i;

    if (l.type === 'dim' || l.type === 'arrow') {
      const wPct = (l.w || 0.2) * 100;
      const h = l.type === 'dim' ? 3 : 2;
      const rot = l.rot || 0;
      const isRotated = Math.abs(rot) > 0;
      const lineW = isRotated ? h : wPct;
      const lineH = isRotated ? wPct : h;

      // Main line
      const line = document.createElement('div');
      line.className = 'ml-line';
      line.style.cssText = `left:${isRotated ? 50 - h/2 : 0}%;top:${isRotated ? 0 : 50 - h/2}%;width:${lineW}%;height:${lineH}px;transform:rotate(${rot}deg);transform-origin:${isRotated ? '50% 0' : '0 50%'};`;
      el.appendChild(line);

      // Ticks at ends
      const tickLen = 6;
      [-1, 1].forEach(side => {
        const tick = document.createElement('div');
        tick.className = 'ml-tick';
        const tickPos = isRotated ? 50 : (side === -1 ? 0 : 100 - tickLen);
        tick.style.cssText = `left:${isRotated ? 50 - 1 : tickPos}%;top:${isRotated ? (side === -1 ? 0 : 100 - tickLen) : 50 - tickLen/2}%;width:${isRotated ? tickLen : 2}px;height:${isRotated ? 2 : tickLen}px;transform:rotate(${rot}deg);`;
        el.appendChild(tick);
      });

      // Text label
      const txt = document.createElement('div');
      txt.className = 'ml-text';
      txt.textContent = l.text;
      const tOff = l.type === 'dim' ? (l.position === 'below' ? 20 : -20) : 16;
      txt.style.transform = `translate(-50%, -50%)`;
      txt.style.marginTop = (l.type === 'dim' ? (l.position === 'below' ? 8 : -8) : 0) + 'px';
      el.appendChild(txt);

      // Resize handle at right end
      const hnd = document.createElement('div');
      hnd.className = 'ml-handle';
      hnd.textContent = '↔';
      hnd.style.cssText = `right:-14px;top:50%;margin-top:-14px;`;
      hnd.onmousedown = (e) => startResize(e, i);
      hnd.ontouchstart = (e) => startResize(e, i);
      el.appendChild(hnd);
    } else {
      // Simple text label
      const txt = document.createElement('div');
      txt.className = 'ml-text';
      txt.textContent = l.text;
      el.appendChild(txt);
    }

    // Make the text the draggable area (parent has zero size)
    txt.onmousedown = (e) => { e.preventDefault(); selectLabel(i); startLabelDrag(e, i); };
    txt.ontouchstart = (e) => { e.preventDefault(); selectLabel(i); startLabelDrag(e, i); };
    // Click selects
    el.onclick = () => selectLabel(i);

    container.appendChild(el);
  });

  // Side panel
  const list = document.getElementById('measurements-list');
  list.innerHTML = labels.map((l, i) => `
    <div class="ll-item ${i === selectedIdx ? 'active' : ''}" onclick="selectLabel(${i})">
      <span>${l.text || l.type}</span>
      <span class="ll-del" onclick="event.stopPropagation();deleteLabel(${i})">✕</span>
    </div>
  `).join('');
}

// ── SELECT / DELETE ──
window.selectLabel = function(i) { selectedIdx = i; renderLabels(); };
window.deleteLabel = function(i) {
  labels.splice(i, 1);
  if (selectedIdx === i) selectedIdx = null;
  else if (selectedIdx > i) selectedIdx--;
  renderLabels();
};
window.addCustomLabel = function() {
  const text = prompt('Texto:'); if (!text) return;
  labels.push({ type: 'text', text, x: 0.5, y: 0.5 });
  selectedIdx = labels.length - 1; renderLabels();
};
window.addDimensionLine = function() {
  const text = prompt('Medida:'); if (!text) return;
  labels.push({ type: 'dim', text: text + '"', x: 0.3, y: 0.5, w: 0.4 });
  selectedIdx = labels.length - 1; renderLabels();
};
window.addArrowLine = function() {
  const text = prompt('Desnivel:'); if (!text) return;
  labels.push({ type: 'arrow', text: text, x: 0.3, y: 0.5, w: 0.4 });
  selectedIdx = labels.length - 1; renderLabels();
};

// ── DRAG (pan + photo) ──
(function() {
  const vp = document.getElementById('photo-viewport');
  let dState = null;
  vp.addEventListener('mousedown', startP);
  vp.addEventListener('touchstart', startP, { passive: false });
  function startP(e) {
    // Ignore if clicking on a label or handle
    if (e.target.closest('.measure-label')) return;
    e.preventDefault();
    const t = e.touches?.[0];
    dState = { x: t?.clientX || e.clientX, y: t?.clientY || e.clientY, px: panX, py: panY, isPinch: false };
    if (e.touches?.length === 2) {
      dState.isPinch = true;
      dState.dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      dState.oz = zoom;
    }
    document.addEventListener('mousemove', moveP);
    document.addEventListener('mouseup', endP);
    document.addEventListener('touchmove', moveP, { passive: false });
    document.addEventListener('touchend', endP);
  }
  function moveP(e) {
    e.preventDefault();
    const t = e.touches?.[0];
    if (!dState) return;
    if (e.touches?.length === 2 && dState.isPinch) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      zoom = Math.max(0.1, Math.min(10, dState.oz * (dist / dState.dist)));
      applyTransform();
      return;
    }
    const cx = t?.clientX || e.clientX;
    const cy = t?.clientY || e.clientY;
    panX = dState.px + (cx - dState.x);
    panY = dState.py + (cy - dState.y);
    applyTransform();
  }
  function endP() {
    dState = null;
    document.removeEventListener('mousemove', moveP);
    document.removeEventListener('mouseup', endP);
    document.removeEventListener('touchmove', moveP);
    document.removeEventListener('touchend', endP);
  }
})();

// ── LABEL DRAG ──
function startLabelDrag(e, idx) {
  e.preventDefault(); e.stopPropagation();
  selectedIdx = idx; renderLabels();
  const t = e.touches?.[0];
  const label = labels[idx];
  dragState = { idx, sx: t?.clientX || e.clientX, sy: t?.clientY || e.clientY, ox: label.x, oy: label.y, isResize: false };

  const move = (ev) => {
    const tt = ev.touches?.[0];
    const cx = tt?.clientX || ev.clientX;
    const cy = tt?.clientY || ev.clientY;
    const img = document.getElementById('photo-transform');
    const rect = img.getBoundingClientRect();
    const dx = (cx - dragState.sx) / rect.width;
    const dy = (cy - dragState.sy) / rect.height;
    label.x = Math.max(0, Math.min(1, dragState.ox + dx));
    label.y = Math.max(0, Math.min(1, dragState.oy + dy));
    renderLabels();
  };
  const up = () => {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('touchend', up);
    dragState = null;
  };
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('touchend', up);
}

function startResize(e, idx) {
  e.preventDefault(); e.stopPropagation();
  selectedIdx = idx; renderLabels();
  const t = e.touches?.[0];
  const label = labels[idx];
  dragState = { idx, sx: t?.clientX || e.clientX, ow: label.w || 0.2, isResize: true };

  const move = (ev) => {
    const tt = ev.touches?.[0];
    const cx = tt?.clientX || ev.clientX;
    const img = document.getElementById('photo-transform');
    const rect = img.getBoundingClientRect();
    const dx = (cx - dragState.sx) / rect.width;
    label.w = Math.max(0.02, dragState.ow + dx);
    renderLabels();
  };
  const up = () => {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('touchend', up);
    dragState = null;
  };
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('touchend', up);
}

// Remove stray document listeners — per-element handlers handle drag now

// ── SAVE / EXPORT ──
window.saveOverlay = async function() {
  const jobId = document.getElementById('job-select').value;
  if (!jobId) { alert('Selecciona una medida.'); return; }
  try {
    await setDoc(doc(db, 'orgs', orgId, 'jobs', jobId), {
      photoOverlay: { labels, updatedAt: serverTimestamp() }
    }, { merge: true });
    document.getElementById('save-btn').textContent = '✓';
    setTimeout(() => document.getElementById('save-btn').textContent = '💾', 2000);
  } catch(e) { alert('Error: ' + e.message); }
};

window.exportPhoto = function() {
  const img = document.getElementById('image-canvas');
  if (!img.src || !img.naturalWidth) return;
  const cvs = document.createElement('canvas');
  cvs.width = img.naturalWidth; cvs.height = img.naturalHeight;
  const ctx = cvs.getContext('2d');
  ctx.drawImage(img, 0, 0);

  labels.forEach(l => {
    const x = l.x * cvs.width, y = l.y * cvs.height;
    const w = (l.w || 0.2) * cvs.width;
    const rot = (l.rot || 0) * Math.PI / 180;
    ctx.save();
    ctx.translate(x, y);
    if (rot) ctx.rotate(rot);

    if (l.type === 'dim' || l.type === 'arrow') {
      const lw = l.type === 'dim' ? 3 : 2;
      ctx.strokeStyle = '#e64980'; ctx.lineWidth = lw;
      ctx.beginPath(); ctx.moveTo(-w/2, 0); ctx.lineTo(w/2, 0); ctx.stroke();
      // Ticks
      [-1, 1].forEach(s => {
        ctx.beginPath(); ctx.moveTo(s * w/2, -5); ctx.lineTo(s * w/2, 5); ctx.stroke();
      });
      // Text
      ctx.font = `bold ${Math.min(cvs.width, cvs.height) * 0.025}px Inter, system-ui, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const pad = 6, m = ctx.measureText(l.text);
      ctx.fillStyle = 'rgba(0,0,0,0.82)';
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(-m.width/2 - pad, -12 - pad, m.width + pad*2, 24 + pad*2, 5) : ctx.rect(-m.width/2 - pad, -12 - pad, m.width + pad*2, 24 + pad*2);
      ctx.fill();
      ctx.strokeStyle = '#e64980'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.fillText(l.text, 0, 2);
    } else {
      ctx.font = `bold ${Math.min(cvs.width, cvs.height) * 0.025}px Inter, system-ui, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const pad = 6, m = ctx.measureText(l.text);
      ctx.fillStyle = 'rgba(0,0,0,0.82)';
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(-m.width/2 - pad, -12 - pad, m.width + pad*2, 24 + pad*2, 5) : ctx.rect(-m.width/2 - pad, -12 - pad, m.width + pad*2, 24 + pad*2);
      ctx.fill();
      ctx.fillStyle = '#fff'; ctx.fillText(l.text, 0, 2);
    }
    ctx.restore();
  });

  const link = document.createElement('a');
  link.download = 'nivelato-foto.png';
  link.href = cvs.toDataURL('image/png');
  link.click();
};

// ── UTILITIES ──
window.toggleSidePanel = () => document.getElementById('side-panel').classList.toggle('open');
window.doSignOut = async () => { await signOut(auth); window.location.href = 'login.html'; };
