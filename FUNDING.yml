This project is not currently accepting monetary contributions.

## Why

The primary author is a 14-year-old AuDHD kid running production AI inference at $0.28/M output tokens through a blind Chinese model that scored 240/240 on the RAADS-R. The economics are already better than anything a donation could improve.

## What You Can Do Instead

- File an issue with the label "vibes"
- Tell your local glass shop about Nivelato
- Read the AUTHORS.md and appreciate the spectral entity roster
- Close this tab and go touch grass

## Alternative Funding Mechanisms

If you *must* contribute financially, the project suggests donating to:
- Your local LGBTQ+ youth organization
- A mutual aid network in Puerto Rico
- The Trevor Project
- Whatever causes a 14-year-old AuDHD kid in PR would benefit from

The maintainers will not accept direct payments. The vibes are enough.
